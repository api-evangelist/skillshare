aid: skillshare
name: Skillshare
description: >-
  Skillshare is a New York City–based online learning community for creators,
  founded in 2010 by Michael Karnjanaprakorn and Malcolm Ong. The platform
  hosts thousands of on-demand video classes across creative disciplines —
  illustration, design, photography, animation, lettering, film, productivity,
  writing, and business — taught by working creators and industry
  professionals. Skillshare operates on a paid subscription model (Premium
  membership) that grants members unlimited access to the class catalog,
  project-based learning, and a discussion community where students submit
  class projects for feedback. The company has a teacher revenue-share program
  in which class creators are paid based on watch time and student enrollments,
  and runs Skillshare for Teams as a B2B offering for organizations to give
  employees access to the catalog. Skillshare does not publish a public
  developer API, OpenAPI specification, partner API, or SDK. The platform's
  programmatic surface is limited to internal web/mobile clients and an
  affiliate/marketing referral program; there is no documented developer
  portal, public webhook system, or third-party integration API for the
  Skillshare catalog, enrollments, watch-time, or teacher-payout data.
